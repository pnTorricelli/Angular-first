<app-header></app-header>
<main>
  <ul id="users">
    @for (user of users; track user.id) {
    <li>
      <app-user (select)="onSelectUser($event)" [user]="user"></app-user>
    </li>
    }
  </ul>
  @if(activeUserId()){
  <app-tasks [id]="activeUserId()"></app-tasks>
  }@else {
  <p id="falbackText">Nessun utente selezionato</p>
  }
</main>
