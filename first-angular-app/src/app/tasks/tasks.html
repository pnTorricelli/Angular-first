<section id="tasks">
  <header>
    <p>{{ nameUser() }}'s Tasks</p>
    <menu>
      <button (click)="onStartAddTask()"> Add Task</button>
    </menu>
  </header>

  @if(isAddingTask()){
  <app-new-task [userId]="id()"></app-new-task>
  }

  <ul>
    @for ( task of tasksUser(); track task.id){
    <li>
      <app-task [task]="task" (completed)="onCompletedTask($event)"></app-task>
    </li>
    }

  </ul>
</section>
